# Undeleter Bot Configuration
# ============================
# This bot listens for deleted messages and reposts them via webhook
# to preserve the message content.
#
# Required Discord Permissions:
# - View Channel (to see messages)
# - Send Messages (to send via webhook)
# - Manage Webhooks (ONLY if auto_create_webhooks is true)
#
# Without Manage Webhooks permission:
#   - You must manually create webhooks for each channel
#   - Configure them in channel_webhooks below
#
# With Manage Webhooks permission:
#   - Set auto_create_webhooks: true
#   - Bot will automatically create webhooks as needed

# Your Discord bot token from https://discord.com/developers/applications
bot_token: "YOUR_BOT_TOKEN_HERE"

# Default webhook URL (fallback if no channel-specific webhook exists)
# Format: https://discord.com/api/webhooks/YOUR_ID/YOUR_TOKEN
webhook_url: "https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN"

# Auto-create webhooks for channels that don't have one
# Requires Manage Webhooks permission
# If true: Bot automatically creates webhooks as needed, ignores webhook_url and channel_webhooks
# If false: You must manually configure webhook_url and/or channel_webhooks below
auto_create_webhooks: true

# Per-channel webhooks (used when auto_create_webhooks is false)
# Use this if you want messages undeleted to their original channel
# Each webhook must be in the same channel as the channel_id
# Format: CHANNEL_ID: WEBHOOK_URL
channel_webhooks:
  # 123456789012345678: "https://discord.com/api/webhooks/ID/TOKEN"
  # 876543210987654321: "https://discord.com/api/webhooks/ID2/TOKEN2"

# Log permanently undeleted messages to a text file
log_undeleted_to_file: true

# File to store undelete logs (only used if log_undeleted_to_file is true)
undelete_log_file: "undeleted.log"

# Trash emoji to prepend to webhook username
# Common options: "🗑️", "🗓️", "🚮", "✅"
trash_emoji: "🗑️"


# Message cache settings
# Maximum number of messages to keep in memory per channel
# Reduce this for lower RAM usage (e.g., 100 for minimal RAM)
cache_max_messages: 100

# Persist messages to file (enable if bot restarts frequently)
cache_persist: true

# File to store persisted messages (only used if cache_persist is true)
cache_file: "messages.dat"

# Skip undeleting messages from privileged users
# DEFAULT: Users with manage_messages permission are skipped
# Options (comma-separated):
#   administrator, admin, manage_messages, manage msg, kick, ban, manage_guild, manage server
skip_permissions: "manage_messages"

# Additionally skip users with specific role IDs
# Useful if you have custom mod roles without standard permissions
skip_role_ids:
  # - 123456789012345678
  # - 876543210987654321

# Guild (server) specific settings
# Blacklisted guild IDs (bot will ignore these servers)
guild_blacklist:
  # - 123456789012345678

# Whitelisted guild IDs (only these servers will be monitored, if non-empty)
guild_whitelist:
  # - 123456789012345678

# Channel specific settings
# Blacklisted channel IDs (bot will ignore these channels)
channel_blacklist:
  # - 123456789012345678

# Whitelisted channel IDs (only these channels will be monitored, if non-empty)
channel_whitelist:
  # - 123456789012345678
